server {
  # Nginx listens on port 80 by default
  listen 80;

  # Use localhost for development, or your domain for production
  server_name localhost;

  # The root directory containing the built Vite app
  root /usr/share/nginx/html;
  index index.html;

  # Hide the nginx version in response headers
  server_tokens off;

  # Compress text-based assets before sending to the browser
  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # Vite outputs hashed, content-addressed filenames into /assets/, so
  # these are safe to cache forever - the filename itself changes if the
  # content does. A missing file here is a genuine 404, never a SPA
  # route, so we don't fall back to index.html like the block below does
  location /assets/ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # index.html references the current build's hashed filenames, so it
  # must never be cached - otherwise a deploy can leave users stuck on a
  # stale shell pointing at assets that no longer exist
  location = /index.html {
    add_header Cache-Control "no-cache";
  }

  # Handle SPA routing - serve index.html for all other routes so
  # client-side routing works on refresh and direct links
  location / {
    try_files $uri /index.html =404;
  }
}