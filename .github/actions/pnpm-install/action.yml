name: 'pnpm install'
description: 'Installs dependencies using pnpm with optional GitHub Packages auth'

inputs:
  node-version:
    required: false
    default: '22.20.0'
  registry-url:
    required: false
    default: ''
  scope:
    required: false
    default: ''
  token:
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        registry-url: ${{ inputs.registry-url }}
        scope: ${{ inputs.scope }}
        cache: pnpm

    - name: Install dependencies
      shell: bash
      env:
        INPUT_TOKEN: ${{ inputs.token }}
      run: |
        if [[ -n "$INPUT_TOKEN" ]]; then
          export NODE_AUTH_TOKEN="$INPUT_TOKEN"
        else
          unset NODE_AUTH_TOKEN
        fi
        pnpm install --frozen-lockfile
