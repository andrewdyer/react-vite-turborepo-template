name: 'require secret'
description: 'Fails when a required secret value is empty'

inputs:
  name:
    description: 'Secret name used in the error message'
    required: true
  value:
    description: 'Secret value to validate'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Validate secret
      shell: bash
      run: |
        if [[ -z "${{ inputs.value }}" ]]; then
          echo "::error::Missing required secret: ${{ inputs.name }}"
          exit 1
        fi
