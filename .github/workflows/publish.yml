name: Publish

on:
  push:
    tags: ['*-v*']

permissions:
  contents: write
  packages: write

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        uses: ./.github/actions/pnpm-install
        with:
          registry-url: https://npm.pkg.github.com
          scope: '@${{ github.repository_owner }}'

      - name: Resolve component, path and version from tag
        id: tag
        run: |
          # Tags are formatted as <component>-v<version> by Release Please,
          # for example "web-v1.2.3". Extract the component by stripping the
          # trailing -v<version> segment, then extract the version.
          TAG="${GITHUB_REF_NAME}"
          COMPONENT="${TAG%-v*}"
          VERSION="${TAG##*-v}"

          # Resolve the workspace path by finding the manifest entry whose
          # path ends with the component name.
          PATH_PREFIX=$(jq -r --arg c "$COMPONENT" \
            'to_entries[] | select(.key | endswith($c)) | .key' \
            .github/.release-please-manifest.json)

          echo "component=$COMPONENT" >> "$GITHUB_OUTPUT"
          echo "path=$PATH_PREFIX" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish package to GitHub Packages
        if: startsWith(steps.tag.outputs.path, 'packages/')
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}
        run: |
          PATH_PREFIX="${{ steps.tag.outputs.path }}"

          # Private packages are versioned by Release Please but are not
          # published to GitHub Packages.
          PRIVATE=$(node -p "require('./$PATH_PREFIX/package.json').private ?? false")

          if [[ "$PRIVATE" == "true" ]]; then
            echo "Skipping $PATH_PREFIX (private)"
          else
            echo "Publishing $PATH_PREFIX..."

            # --no-git-checks bypasses pnpm's clean working tree check, which
            # fails because Release Please has already committed the version bump.
            pnpm --filter "./$PATH_PREFIX" publish \
              --no-git-checks \
              --access public
          fi

      - name: Login to GitHub Container Registry
        if: startsWith(steps.tag.outputs.path, 'apps/')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push Docker image
        if: startsWith(steps.tag.outputs.path, 'apps/')
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}
        run: |
          APP_NAME=$(basename "${{ steps.tag.outputs.path }}")
          VERSION="${{ steps.tag.outputs.version }}"
          IMAGE="ghcr.io/${{ github.repository_owner }}/${APP_NAME}"

          # Build the application image using the shared Dockerfile, passing
          # the app name as a build argument. The NODE_AUTH_TOKEN environment
          # variable is forwarded to BuildKit as the optional npm_token secret
          # so private GitHub Packages can be installed during the build.
          echo "Building and pushing $IMAGE:$VERSION..."

          docker build \
            --secret id=npm_token,env=NODE_AUTH_TOKEN \
            --build-arg APP_NAME="$APP_NAME" \
            -t "$IMAGE:$VERSION" \
            -t "$IMAGE:latest" \
            .

          # Push both the versioned and latest image tags.
          docker push "$IMAGE:$VERSION"
          docker push "$IMAGE:latest"

          # Trigger the Deploy workflow, passing the application name and
          # version as the event payload.
          echo "Dispatching deploy event for $APP_NAME@$VERSION..."

          curl -s -X POST \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d "{\"event_type\":\"deploy\",\"client_payload\":{\"app\":\"$APP_NAME\",\"version\":\"$VERSION\"}}"
