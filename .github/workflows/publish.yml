name: Publish

on:
  workflow_run:
    workflows:
      - Release
    types:
      - completed

permissions:
  contents: read

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Get Release Please outputs
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json

      - name: Publish packages to npm
        if: ${{ steps.release.outputs.releases_created }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PATHS='${{ steps.release.outputs.paths_released }}'
          echo "$PATHS" | jq -r '.[]' | while read path; do
            if [[ "$path" == packages/* ]]; then
              PRIVATE=$(node -e "console.log(require('./$path/package.json').private ?? false)")
              if [[ "$PRIVATE" == "true" ]]; then
                echo "Skipping $path (private)"
              else
                echo "Publishing $path..."
                pnpm --filter "./$path" publish --no-git-checks --access public
              fi
            fi
          done

      - name: Login to Docker Hub
        if: ${{ steps.release.outputs.releases_created }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker images
        if: ${{ steps.release.outputs.releases_created }}
        run: |
          PATHS='${{ steps.release.outputs.paths_released }}'
          MANIFEST='${{ steps.release.outputs.releases }}'
          echo "$PATHS" | jq -r '.[]' | while read path; do
            if [[ "$path" == apps/* ]]; then
              APP_NAME=$(basename "$path")
              VERSION=$(echo "$MANIFEST" | jq -r --arg p "$path" '.[$p].version')
              IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/${APP_NAME}"
              echo "Building and pushing $IMAGE:$VERSION..."
              docker build \
                --build-arg APP_NAME="$APP_NAME" \
                -t "$IMAGE:$VERSION" \
                -t "$IMAGE:latest" \
                .
              docker push "$IMAGE:$VERSION"
              docker push "$IMAGE:latest"
            fi
          done