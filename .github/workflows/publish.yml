name: Publish

on:
  push:
    tags: ['*-v*']

permissions:
  contents: write
  packages: write

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        uses: ./.github/actions/pnpm-install
        with:
          registry-url: https://npm.pkg.github.com
          scope: '@${{ github.repository_owner }}'

      - name: Resolve component, path and version from tag
        id: tag
        run: |
          # Tags are formatted as <component>-v<version>
          # Example: web-v1.2.3
          TAG="${GITHUB_REF_NAME}"

          # Extract component and version parts from the tag
          COMPONENT="${TAG%-v*}"
          VERSION="${TAG##*-v}"

          # Find matching workspace path from Release Please manifest.
          # We enforce exactly ONE match to avoid ambiguous publishing targets.
          MATCHES=$(jq -r --arg c "$COMPONENT" '
            to_entries[]
            | select(.key | endswith($c))
            | .key
          ' .github/.release-please-manifest.json)

          # Ensure deterministic single match
          COUNT=$(echo "$MATCHES" | sed '/^$/d' | wc -l | tr -d ' ')

          if [[ "$COUNT" -eq 0 ]]; then
            echo "❌ No manifest entry found for component: $COMPONENT"
            exit 1
          fi

          if [[ "$COUNT" -gt 1 ]]; then
            echo "❌ Multiple manifest entries found for component: $COMPONENT"
            echo "$MATCHES"
            exit 1
          fi

          PATH_PREFIX="$MATCHES"

          echo "component=$COMPONENT" >> "$GITHUB_OUTPUT"
          echo "path=$PATH_PREFIX" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish package to GitHub Packages
        # Only run for workspace paths under packages/
        if: startsWith(steps.tag.outputs.path, 'packages/')
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}
        run: |
          PATH_PREFIX="${{ steps.tag.outputs.path }}"

          # Determine whether this package is marked as private.
          PRIVATE=$(node -p "require('./$PATH_PREFIX/package.json').private ?? false")

          if [[ "$PRIVATE" == "true" ]]; then
            echo "Skipping $PATH_PREFIX (private package)"
            exit 0
          fi

          echo "Publishing $PATH_PREFIX to GitHub Packages..."

          # --no-git-checks is required because Release Please already committed
          # version bumps, which would otherwise cause pnpm publish to fail.
          pnpm --filter "./$PATH_PREFIX" publish \
            --no-git-checks \
            --access public

      - name: Login to GitHub Container Registry
        if: startsWith(steps.tag.outputs.path, 'apps/')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push Docker image
        if: startsWith(steps.tag.outputs.path, 'apps/')
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}
        run: |
          APP_NAME=$(basename "${{ steps.tag.outputs.path }}")
          VERSION="${{ steps.tag.outputs.version }}"
          IMAGE="ghcr.io/${{ github.repository_owner }}/${APP_NAME}"

          echo "Building and pushing $IMAGE:$VERSION..."

          # Build image with access to private npm packages via BuildKit secret
          docker build \
            --secret id=npm_token,env=NODE_AUTH_TOKEN \
            --build-arg APP_NAME="$APP_NAME" \
            -t "$IMAGE:$VERSION" \
            -t "$IMAGE:latest" \
            .

          # Push both versioned and latest tags
          docker push "$IMAGE:$VERSION"
          docker push "$IMAGE:latest"

          echo "Dispatching deploy event for $APP_NAME@$VERSION..."

          # Trigger downstream deploy workflow via repository dispatch.
          # IMPORTANT: --fail ensures HTTP 4xx/5xx responses fail the workflow.
          # Without this, curl would exit 0 even if GitHub rejected the request.
          curl --fail --show-error \
            -X POST \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d "{\"event_type\":\"deploy\",\"client_payload\":{\"app\":\"$APP_NAME\",\"version\":\"$VERSION\"}}"
