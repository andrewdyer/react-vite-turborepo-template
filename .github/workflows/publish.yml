name: Publish

on:
  workflow_run:
    workflows:
      - Release
    types:
      - completed

permissions:
  contents: read

jobs:
  get-release-outputs:
    name: Get Release Outputs
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      paths_released: ${{ steps.release.outputs.paths_released }}
      releases: ${{ steps.release.outputs.releases }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get Release Please outputs
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json

  publish-packages:
    name: Publish Packages
    runs-on: ubuntu-latest
    needs: get-release-outputs
    if: ${{ needs.get-release-outputs.outputs.releases_created }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish packages to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Read the list of released workspace paths from Release Please outputs
          PATHS='${{ needs.get-release-outputs.outputs.paths_released }}'

          # Iterate over released paths and process only those under packages/
          echo "$PATHS" | jq -r '.[]' | while read path; do
            if [[ "$path" == packages/* ]]; then

              # Read the private field from the package's package.json —
              # private packages are versioned by Release Please but not published
              PRIVATE=$(node -e "console.log(require('./$path/package.json').private ?? false)")
              if [[ "$PRIVATE" == "true" ]]; then
                echo "Skipping $path (private)"
              else
                echo "Publishing $path..."
                # --no-git-checks bypasses pnpm's clean working tree check,
                # which fails here because Release Please has already committed
                # the version bump ahead of this step
                pnpm --filter "./$path" publish --no-git-checks --access public
              fi
            fi
          done

  publish-images:
    name: Publish Images
    runs-on: ubuntu-latest
    needs: get-release-outputs
    if: ${{ needs.get-release-outputs.outputs.releases_created }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker images
        run: |
          # Read the list of released workspace paths and the full release
          # manifest from Release Please outputs
          PATHS='${{ needs.get-release-outputs.outputs.paths_released }}'
          MANIFEST='${{ needs.get-release-outputs.outputs.releases }}'

          # Iterate over released paths and process only those under apps/
          echo "$PATHS" | jq -r '.[]' | while read path; do
            if [[ "$path" == apps/* ]]; then

              # Resolve the app name, release version, and target image name
              # for this iteration
              APP_NAME=$(basename "$path")
              VERSION=$(echo "$MANIFEST" | jq -r --arg p "$path" '.[$p].version')
              IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/${APP_NAME}"

              # Build the Docker image using the shared Dockerfile, passing
              # the app name as a build argument so it knows which app to
              # build and serve. Tag with both the version and latest.
              echo "Building and pushing $IMAGE:$VERSION..."
              docker build \
                --build-arg APP_NAME="$APP_NAME" \
                -t "$IMAGE:$VERSION" \
                -t "$IMAGE:latest" \
                .

              # Push both tags to Docker Hub
              docker push "$IMAGE:$VERSION"
              docker push "$IMAGE:latest"

              # Fire a repository_dispatch event to trigger the Deploy workflow
              # for this app, passing the app name and version as payload so
              # the deploy job knows exactly what was published
              echo "Dispatching deploy event for $APP_NAME@$VERSION..."
              curl -s -X POST \
                -H "Authorization: Bearer ${{ secrets.RELEASE_PLEASE_TOKEN }}" \
                -H "Accept: application/vnd.github+json" \
                https://api.github.com/repos/${{ github.repository }}/dispatches \
                -d "{\"event_type\":\"deploy\",\"client_payload\":{\"app\":\"$APP_NAME\",\"version\":\"$VERSION\"}}"
            fi
          done
