name: Deploy

on:
  repository_dispatch:
    types: [deploy]

run-name: '${{ github.event.client_payload.app }}@${{ github.event.client_payload.version }}'

permissions:
  contents: read

jobs:
  setup:
    uses: andrewdyer/react-vite-turborepo-workflows/.github/workflows/deploy.yml@v1
    with:
      app: ${{ github.event.client_payload.app }}
      version: ${{ github.event.client_payload.version }}

  deploy:
    name: Deploy
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy app
        run: |
          IMAGE="${{ needs.setup.outputs.image }}"
          VERSION="${{ needs.setup.outputs.version }}"

          if [[ -z "$IMAGE" || -z "$VERSION" ]]; then
            echo "❌ Missing outputs from setup job (image or version)"
            exit 1
          fi

          echo "Deploying $IMAGE:$VERSION..."

          # TODO: add your deployment logic here.
          # At this point the following variables are available:
          #   IMAGE   — the GHCR image name (e.g. "ghcr.io/dyerlabs/frontend-web")
          #   VERSION — the released version (e.g. "1.2.3")
          echo "❌ Deployment logic not yet implemented"
          exit 1
