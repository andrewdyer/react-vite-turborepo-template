name: Deploy

on:
  repository_dispatch:
    types: [deploy]

run-name: '${{ github.event.client_payload.app }}@${{ github.event.client_payload.version }}'

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment inputs
        run: |
          APP_NAME="${{ github.event.client_payload.app }}"
          VERSION="${{ github.event.client_payload.version }}"

          if [[ -z "$APP_NAME" || -z "$VERSION" ]]; then
            echo "❌ Missing deploy payload (app or version)"
            exit 1
          fi

          echo "App: $APP_NAME"
          echo "Version: $VERSION"

      - name: Deploy app (template)
        run: |
          APP_NAME="${{ github.event.client_payload.app }}"
          VERSION="${{ github.event.client_payload.version }}"
          IMAGE="ghcr.io/${{ github.repository_owner }}/${APP_NAME}"

          echo "=================================================="
          echo "⚠️  DEPLOYMENT NOT CONFIGURED"
          echo "=================================================="
          echo "App:    $APP_NAME"
          echo "Version:$VERSION"
          echo "Image:  $IMAGE:$VERSION"
          echo ""
          echo "This workflow is a deployment template."
          echo "No infrastructure changes have been made."
          echo ""
          echo "To enable deployments, replace this step with:"
          echo "- Kubernetes rollout"
          echo "- SSH deploy script"
          echo "- ECS / Cloud Run / Helm release"
          echo "=================================================="

          exit 1
