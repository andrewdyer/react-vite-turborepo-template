name: Rollback

on:
  workflow_dispatch:
    inputs:
      app:
        description: App to roll back (e.g. "web")
        required: true
        type: string
      version:
        description: Version to roll back to (e.g. "1.2.3")
        required: true
        type: string

permissions:
  contents: read

jobs:
  rollback:
    name: Rollback
    runs-on: ubuntu-latest

    # To require manual approval before a rollback is executed, uncomment
    # the line below. The environment must first be configured under
    # Settings → Environments with a protection rule and required reviewers.
    # environment: production  ← uncomment this line

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rollback
        run: |
          echo "Rolling back ${{ github.event.inputs.app }} to v${{ github.event.inputs.version }}"
          # Add rollback steps here
