name: Rollback

on:
  workflow_dispatch:
    inputs:
      app:
        description: App to roll back (e.g. "web")
        required: true
        type: string
      version:
        description: Version to roll back to (e.g. "1.2.3")
        required: true
        type: string

run-name: '${{ github.event.inputs.app }}@${{ github.event.inputs.version }}'

permissions:
  contents: read

jobs:
  rollback:
    name: Rollback
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rollback app
        run: |
          APP_NAME="${{ github.event.inputs.app }}"
          VERSION="${{ github.event.inputs.version }}"
          IMAGE="ghcr.io/${{ github.repository_owner }}/${APP_NAME}"

          echo "Rolling back $APP_NAME to $VERSION (image: $IMAGE)..."

          # TODO: add your rollback logic here.
          # At this point the following variables are available:
          #   APP_NAME — the name of the app (e.g. "web")
          #   VERSION  — the version to roll back to (e.g. "1.2.3")
          #   IMAGE    — the GHCR image name (e.g. "ghcr.io/your-github-org/web")
